<body>
<script>renderLayout({"key":"color","title":"Color","depth":1,"section":"Foundation","label":"Foundation · 01","desc":"Semantic tokens authored in OKLCH. Every role — <span class=\"mono\">accent</span>, <span class=\"mono\">success</span>, <span class=\"mono\">danger</span> — ships a base, hover, soft, and foreground pair. Compose against tokens, never raw values.","content":"\n    <section>\n      <h3 class=\"sub\">Surface &amp; base <span class=\"tag\">structural</span></h3>\n      <div class=\"token-list\" id=\"tokens-surface\"></div>\n      <h3 class=\"sub\">Accent &amp; default <span class=\"tag\">interactive</span></h3>\n      <div class=\"token-list\" id=\"tokens-accent\"></div>\n      <h3 class=\"sub\">Status <span class=\"tag\">semantic</span></h3>\n      <div class=\"token-list\" id=\"tokens-status\"></div>\n      <h3 class=\"sub\">Soft variants <span class=\"tag\">15% mix</span></h3>\n      <div class=\"token-grid\" id=\"tokens-soft\"></div>\n    </section>\n  ","prev":{"href":"index.html","title":"Zi UI v3"},"next":{"href":"foundations/typography.html","title":"Typography"}});</script>
<script>

    const tokens = {
      surface: [
        { name: 'background', desc: 'Page background', v: '--background' },
        { name: 'foreground', desc: 'Primary text color', v: '--foreground' },
        { name: 'surface', desc: 'Cards, accordions', v: '--surface' },
        { name: 'surface-secondary', desc: 'Recessed panels', v: '--surface-secondary' },
        { name: 'surface-tertiary', desc: 'Nested panels', v: '--surface-tertiary' },
        { name: 'overlay', desc: 'Popovers, modals, menus', v: '--overlay' },
        { name: 'muted', desc: 'Secondary text', v: '--muted' },
        { name: 'border', desc: 'Component borders', v: '--border' },
        { name: 'separator', desc: 'Horizontal rules', v: '--separator' },
      ],
      accent: [
        { name: 'accent', desc: 'Primary brand', v: '--accent' },
        { name: 'accent-foreground', desc: 'Text on accent', v: '--accent-foreground' },
        { name: 'default', desc: 'Quiet interactive surface', v: '--default' },
        { name: 'default-foreground', desc: 'Text on default', v: '--default-foreground' },
        { name: 'focus', desc: 'Focus ring', v: '--focus' },
        { name: 'link', desc: 'Links', v: '--link' },
      ],
      status: [
        { name: 'success', desc: 'Positive confirmation', v: '--success' },
        { name: 'warning', desc: 'Caution', v: '--warning' },
        { name: 'danger', desc: 'Destructive / errors', v: '--danger' },
      ],
      soft: [
        { name: 'accent-soft', desc: '15% mix of accent', v: '--color-accent-soft' },
        { name: 'success-soft', desc: '15% mix of success', v: '--color-success-soft' },
        { name: 'warning-soft', desc: '15% mix of warning', v: '--color-warning-soft' },
        { name: 'danger-soft', desc: '15% mix of danger', v: '--color-danger-soft' },
      ],
    };
    const list = (id, arr) => document.getElementById(id).innerHTML = arr.map(t =>
      '<div class="token-row"><div class="dot" style="background:var(' + t.v + ')"></div><div class="name">' + t.name + '<small>' + t.desc + '</small></div><div class="val">' + t.v + '</div></div>').join('');
    const grid = (id, arr) => document.getElementById(id).innerHTML = arr.map(t =>
      '<div class="swatch"><div class="chip" style="background:var(' + t.v + ')"></div><div class="meta"><div class="name">' + t.name + '</div><div class="val">' + t.v + '</div><div class="val" style="color:var(--muted)">' + t.desc + '</div></div></div>').join('');
    list('tokens-surface', tokens.surface);
    list('tokens-accent', tokens.accent);
    list('tokens-status', tokens.status);
    grid('tokens-soft', tokens.soft);
  
</script>
</body>
</html>
