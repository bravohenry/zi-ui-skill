<!-- ROLE: Status/tag vocabulary. Demonstrates: soft vs primary × accent/success/warning/danger, sizes, dot indicator. Use as truth for status color semantics. -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zi UI v3 — Chip</title>
<!--
  ROLE: Style anchor for AI agents consuming this skill.
  Minimal standalone page — only loads the two truth-source CSS files.
  No navigation shell, no docs-site chrome.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/duotone/style.css">
<link rel="stylesheet" href="../assets/tokens.css" />
<link rel="stylesheet" href="../assets/components.css" />
<style>
  body {
    margin: 0; padding: 48px 56px; max-width: 960px;
    font: 400 14px/1.5 "Geist", sans-serif;
    background: var(--background); color: var(--foreground);
  }
  header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--separator); }
  header .label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; }
  header h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.02em; margin: 8px 0 10px; }
  header p { font-size: 14px; line-height: 1.55; color: var(--muted); margin: 0; max-width: 640px; }
  .demo-grid { display: flex; flex-direction: column; gap: 24px; }
  .demo { border: 1px solid var(--separator); border-radius: 16px; overflow: hidden; background: var(--surface); }
  .demo .head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--separator); background: var(--surface-secondary); }
  .demo .head .title { font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; color: var(--foreground); }
  .demo .head .title i { color: var(--accent); font-size: 14px; }
  .demo .head .tags { display: inline-flex; gap: 6px; }
  .demo .head .tags span { font-family: "JetBrains Mono", monospace; font-size: 10.5px; color: var(--muted); padding: 2px 6px; background: var(--background); border: 1px solid var(--separator); border-radius: 4px; }
  .demo .body { padding: 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
</style>
</head>
<body>
<header>
  <div class="label">Component · 08</div>
  <h1>Chip</h1>
  <p>Pills in primary, soft, and default flavors. Three sizes, rounded to full.</p>
</header>
<div class="demo-grid">
      <div class="demo"><div class="head"><span class="title"><i class="ph-duotone ph-tag"></i>Primary</span><span class="tags"><span>solid</span></span></div>
        <div class="body">
          <span class="chip chip--primary chip--accent">Accent</span>
          <span class="chip chip--primary chip--success">Success</span>
          <span class="chip chip--primary chip--warning">Warning</span>
          <span class="chip chip--primary chip--danger">Danger</span>
        </div></div>
      <div class="demo"><div class="head"><span class="title"><i class="ph-duotone ph-tag"></i>Soft</span><span class="tags"><span>15% mix</span></span></div>
        <div class="body">
          <span class="chip chip--soft chip--accent"><span class="dot"></span>Accent</span>
          <span class="chip chip--soft chip--success"><span class="dot"></span>Success</span>
          <span class="chip chip--soft chip--warning"><span class="dot"></span>Warning</span>
          <span class="chip chip--soft chip--danger"><span class="dot"></span>Danger</span>
        </div></div>
      <div class="demo"><div class="head"><span class="title"><i class="ph-duotone ph-ruler"></i>Sizes</span><span class="tags"><span>sm · md · lg</span></span></div>
        <div class="body">
          <span class="chip chip--soft chip--accent chip--sm">Small</span>
          <span class="chip chip--soft chip--accent">Medium</span>
          <span class="chip chip--soft chip--accent chip--lg">Large</span>
        </div></div>
    </div>
</body>
</html>
